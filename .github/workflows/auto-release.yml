name: auto-release

on:
  pull_request_target:
    types: [closed]

jobs:
  publish:
    if: github.event.pull_request.merged && startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Wesley-Work/MTB-release-action@develop
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repoName: 'MTB-TEST'